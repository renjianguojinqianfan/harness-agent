version: "1.0"

model:
  provider: anthropic
  model: claude-3-5-sonnet
  temperature: 0.7

agents:
  plan:
    max_iterations: 5
  build:
    max_iterations: 10

skills:
  - ohmyopencode
  - superpowers
  - openspec
  - spec-kit

# NOTE: You may add a `commands` section here to define custom CLI shortcuts.
#       This template omits it to stay minimal; add only if your team needs them.

context:
  max_tokens: 8000
  include_git_history: true
